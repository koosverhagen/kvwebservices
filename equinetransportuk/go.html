<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Opening link | Equine Transport UK</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fa;
        color: #1d2530;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
      }

      .card {
        width: min(520px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #dbe1e8;
        border-radius: 22px;
        padding: 24px;
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 26px;
        letter-spacing: -0.04em;
      }

      p {
        margin: 8px 0;
        color: #5a6675;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 16px;
        padding: 0 18px;
        border-radius: 12px;
        background: #1f6feb;
        color: #ffffff;
        text-decoration: none;
        font-weight: 800;
      }

      .small {
        margin-top: 14px;
        font-size: 13px;
        word-break: break-all;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <h1>Opening your Equine Transport UK link…</h1>
      <p id="status">Please wait.</p>
      <a id="manual-link" href="index.html" hidden>Open link</a>
      <p id="manual-url" class="small"></p>
    </main>

    <script>
      (function () {
        const statusEl = document.getElementById("status");
        const manualLink = document.getElementById("manual-link");
        const manualUrl = document.getElementById("manual-url");

        const params = new URLSearchParams(window.location.search);
        const token = String(params.get("to") || "").trim();

        function fail() {
          statusEl.textContent =
            "Sorry, this link could not be opened. Please contact Equine Transport UK.";
          manualLink.href = "contact.html";
          manualLink.textContent = "Contact us";
          manualLink.hidden = false;
        }

        if (!token) {
          fail();
          return;
        }

        let target = "";

        if (token.startsWith("form-short-")) {
          const bookingId = token.slice("form-short-".length);
          target = `forms/short-form.html?bookingId=${encodeURIComponent(bookingId)}`;
        } else if (token.startsWith("form-long-")) {
          const bookingId = token.slice("form-long-".length);
          target = `forms/long-form.html?bookingId=${encodeURIComponent(bookingId)}`;
        } else if (token.startsWith("deposit-")) {
          const bookingId = token.slice("deposit-".length);
          target = `pay-deposit.html?bookingId=${encodeURIComponent(bookingId)}`;
        } else if (token.startsWith("balance-")) {
          const bookingId = token.slice("balance-".length);
          target = `pay-outstanding.html?bookingId=${encodeURIComponent(bookingId)}`;
        }

        if (!target) {
          fail();
          return;
        }

        statusEl.textContent = "Redirecting now…";
        manualLink.href = target;
        manualLink.hidden = false;
        manualUrl.textContent = target;

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
