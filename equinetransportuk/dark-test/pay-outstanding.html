<!DOCTYPE html>
<html>

<head>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://www.equinetransportuk.com/" />
  <title>Secure Outstanding Payment | Equine Transport UK</title>
</head>

<body>

<div style="position:fixed;left:10px;bottom:10px;z-index:999999;background:#facc15;color:#111827;padding:8px 12px;border-radius:999px;font-weight:900;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.18);">
  TEST DESIGN
</div>

  <h2>Redirecting to payment...</h2>

  <script>
    const params = new URLSearchParams(window.location.search);
    const bookingId = params.get("bookingId");

    if (!bookingId) {
      document.body.innerHTML = "<h2>Invalid booking link</h2>";
    } else {

      fetch(`https://equine-bookings-api.kverhagen.workers.dev/api/outstanding-session?bookingId=${bookingId}`)
        .then(res => res.json())
        .then(data => {

          if (data.url) {
            window.location.href = data.url;
          } else {
            document.body.innerHTML = "<h2>Payment error</h2>";
          }

        })
        .catch(() => {
          document.body.innerHTML = "<h2>Connection error</h2>";
        });

    }
  </script>

</body>

</html>
