<!DOCTYPE html>
<html>
<head>
  <title>Secure Deposit</title>
  <script src="https://js.stripe.com/v3/"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="deposit-wrap">

  <div class="deposit-card">

    <img src="images/logo.png" class="deposit-logo">

    <h2>Deposit Hold (£200.00)</h2>

    <p id="booking-info"></p>

    <form id="payment-form">

      <label>Full Name</label>
      <input type="text" id="card-name" placeholder="Full Name" required>

      <label>Card Details</label>
      <div id="card-element" class="stripe-card"></div>

      <button id="submit-btn">
        Confirm Hold
      </button>

    </form>

    <div id="message"></div>

    <p class="deposit-note">
      This is a <strong>card authorisation only</strong>. No money is taken unless required.
    </p>

  </div>

</div>

<script>
const stripe = Stripe("pk_test_51PmwmdB9WIgqJu1YURUMM1LhXuhCDRKs7vQR28P7tcKElI1tonLWvjorRDwYSShdWUAUK0B8VIudUKAjkZTV7ufR00RElx5bHg"); // 🔥 IMPORTANT

const params = new URLSearchParams(window.location.search);
const bookingId = params.get("bookingId");

if (!bookingId) {
  document.body.innerHTML = "<h2>Invalid booking link</h2>";
}

let elements;

fetch("https://equine-bookings-api.kverhagen.workers.dev/api/deposit-intent", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ bookingId })
})
.then(res => res.json())
.then(data => {

  const clientSecret = data.clientSecret;

  elements = stripe.elements({
    locale: "en-GB",
    style: {
      base: {
        fontSize: "16px"
      }
    }
  });

  // 🔥 FIX 1: remove postcode requirement
  const card = elements.create("card", {
    hidePostalCode: true
  });

  card.mount("#card-element");

  const form = document.getElementById("payment-form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("card-name").value;

    const result = await stripe.confirmCardPayment(clientSecret, {
      payment_method: {
        card: card,
        billing_details: {
          name: name
          // ❌ removed address block (prevents postcode error)
        }
      }
    });

    if (result.error) {
      document.getElementById("message").innerText = result.error.message;
    } else {
      window.location.href = "index.html?deposit=success";
    }
  });

});
</script>

</body>
</html>
